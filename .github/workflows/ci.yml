name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: monqom
          POSTGRES_PASSWORD: monqom
          POSTGRES_DB: monqom_ci
        ports: ["5432:5432"]
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://monqom:monqom@127.0.0.1:5432/monqom_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --runInBand
      - run: npm run migrate:deploy
      - run: npm run test:e2e:critical -- --runInBand
      - run: npm run build
      - run: npm audit --audit-level=high
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm audit --audit-level=high
  production-containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Dokploy Compose
        env:
          DATABASE_URL: postgresql://monqom:monqom@database:5432/monqom
          SESSION_SECRET: 01234567890123456789012345678901
          TOTP_ENCRYPTION_KEY: 01234567890123456789012345678901
          FRONTEND_URL: https://app.example.test
          CORS_ALLOWED_ORIGINS: https://app.example.test
          RESEND_API_KEY: re_test_placeholder
          EMAIL_FROM: Monqom <noreply@example.test>
          TURNSTILE_ENABLED: "true"
          TURNSTILE_SECRET_KEY: turnstile_test_placeholder
          VITE_TURNSTILE_SITE_KEY: turnstile_site_test_placeholder
          APP_VERSION: ci
          GIT_SHA: ${{ github.sha }}
        run: docker compose -f docker-compose.dokploy.yml config --quiet
      - run: docker build --target migration --tag monqom-backend-migration:ci backend
      - run: docker build --target runtime --tag monqom-backend:ci backend
      - run: docker build --tag monqom-frontend:ci frontend