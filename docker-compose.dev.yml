services:
  postgres:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: monqom
      POSTGRES_PASSWORD: monqom
      POSTGRES_DB: monqom_dev
    ports:
      - "5432:5432"
    volumes:
      - monqom-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monqom -d monqom_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://monqom:monqom@postgres:5432/monqom_dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - monqom-backend-node_modules:/app/node_modules
    command: sh -c "npm run migrate:deploy && npm run start:dev"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s

volumes:
  monqom-pgdata:
  monqom-backend-node_modules:
