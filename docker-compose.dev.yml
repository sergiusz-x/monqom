services:
  postgres:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - monqom-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - monqom-backend-node_modules:/app/node_modules
    command: sh -c "npx prisma generate && npm run migrate:deploy && npm run start:dev"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_TARGET: http://backend:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - monqom-frontend-node_modules:/app/node_modules

volumes:
  monqom-pgdata:
  monqom-backend-node_modules:
  monqom-frontend-node_modules:
